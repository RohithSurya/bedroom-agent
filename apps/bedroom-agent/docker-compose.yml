services:
  bedroom-agent:
    env_file:
    - .env
    container_name: bedroom-agent
    build: .
    restart: unless-stopped
    ports:
      - "9000:9000"

    # This makes "host.docker.internal" work on Linux (Jetson),
    # so you don’t hardcode 10.0.0.xxx anywhere.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      TZ: America/New_York
      HA_BASE_URL: "http://host.docker.internal:8123"
      LLM_BASE_URL: "http://host.docker.internal:11434"


    # MQTT
    MQTT_HOST: "host.docker.internal"
    MQTT_PORT: "1883"
    # MQTT_URL: "mqtt://host.docker.internal:1883"  # if/when you wire MQTT into the agent
    # Add others as needed:
    # LOG_LEVEL: "INFO"
    # SQLITE_PATH: "/data/memory.sqlite"

    # SQLite
    SQLITE_PATH: "/data/memory.sqlite"


    volumes:
      - ./data:/data

    # # Optional: only if you have /healthz implemented
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -fsS http://localhost:9000/healthz || exit 1"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 5