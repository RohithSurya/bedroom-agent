name: night_mode_ab
description: "Call night_mode twice. Active commits cooldown and blocks the second call; Shadow does not."

initial_state:
  presence: true
  guest_mode: false

steps:
  - advance_seconds: 0
    request:
      intent: night_mode
      args: {}

  - advance_seconds: 60
    request:
      intent: night_mode
      args: {}
