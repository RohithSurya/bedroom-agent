name: sleep_mode_ab
description: "Call sleep_mode twice. Active commits cooldown and blocks the second call; Shadow does not."

initial_state:
  presence: true
  guest_mode: false

steps:
  - advance_seconds: 0
    request:
      intent: sleep_mode
      args: {}

  - advance_seconds: 30
    request:
      intent: sleep_mode
      args: {}
