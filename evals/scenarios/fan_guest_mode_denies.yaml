name: fan_guest_mode_denies
description: "Guest mode ON should deny fan power control"

initial_state:
  presence: true
  guest_mode: true

steps:
  - request:
      intent: fan_on
      args:
        entity_id: fan.bedroom_fan
    expect:
      decision: deny
      reason_contains: guest_mode_on
      not_action_tools: [fan.set]
      final_success: true
