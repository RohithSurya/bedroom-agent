name: night_mode_hard_fail_no_cooldown
description: "If lights hard-fail, cooldown should NOT start; second call should allow again"

initial_state:
  presence: true
  guest_mode: false

steps:
  - request:
      intent: night_mode
      args:
        entity_id: light.bedroom_lamp
        brightness_pct: 10
        transition_s: 1
    failure_injection:
      - tool: light.set
        times: 2
        error: simulated_timeout
    expect:
      decision: allow
      final_success: false

  - request:
      intent: night_mode
      args: {}
    expect:
      decision: allow
      final_success: true
