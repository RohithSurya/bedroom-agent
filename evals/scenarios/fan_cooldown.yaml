name: fan_cooldown
description: "Fan ON succeeds then immediate retry denied by cooldown"

initial_state:
  presence: true
  guest_mode: false

steps:
  - request:
      intent: fan_on
      args:
        entity_id: fan.bedroom_fan
    expect:
      decision: allow
      final_success: true

  - request:
      intent: fan_on
      args:
        entity_id: fan.bedroom_fan
    expect:
      decision: deny
      reason_contains: cooldown_active
      not_action_tools: [fan.set]
      final_success: true
