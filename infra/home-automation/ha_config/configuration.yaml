
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
python_script:

rest_command:
  bedroom_agent_run:
    url: "http://10.0.0.179:9000/agent/run"
    method: POST
    timeout: 10
    content_type: "application/json"
    payload: >
      {
        "intent": "{{ intent }}",
        "args": {{ args | default({}) | tojson }},
        "state": {{ state | default({}) | tojson }}
      }
  bedroom_agent_chat:
    url: "http://10.0.0.179:9000/agent/chat"
    method: POST
    timeout: 60
    content_type: "application/json"
    payload: >
      {
        "text": {{ text | tojson }},
        "state": {{ state | default({}) | tojson }}
      }


template:
  - fan:
      - name: "Bedroom Fan"
        unique_id: bedroom_fan_agent
        # Expose the bedroom fan as a fan entity backed by the plug state.
        state: "{{ is_state('switch.bedroom_fan_plug', 'on') }}"
        turn_on:
          service: switch.turn_on
          target:
            entity_id: switch.bedroom_fan_plug
        turn_off:
          service: switch.turn_off
          target:
            entity_id: switch.bedroom_fan_plug





smartir:

climate:
  - platform: smartir
    name: Bedroom AC
    unique_id: bedroom_ac
    device_code: 1390      # change if needed
    controller_data: remote.broadlink_rm4_mini
    delay: 0.2
